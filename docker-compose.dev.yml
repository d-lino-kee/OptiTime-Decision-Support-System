services:
  mongo:
    image: mongo:7
    container_name: optitime-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: optitime
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: optitime-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  weaviate:
    image: semitechnologies/weaviate:1.27.3
    container_name: optitime-weaviate
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate

  ai:
    build: ./apps/ai-service
    container_name: optitime-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_HMAC_SECRET: dev_ai_hmac_change_me
      WEAVIATE_URL: http://weaviate:8080
      ENABLE_WEAVIATE: "false"
      ENABLE_REAL_MODELS: "false"
    depends_on:
      - weaviate

volumes:
  mongo_data:
  redis_data:
  weaviate_data:
